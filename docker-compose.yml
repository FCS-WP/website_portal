services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: epos-app
    user: root
    volumes:
      - ./portal:/var/www/portal
    networks:
      - epos-network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: epos-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./portal:/var/www/portal
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - epos-network
    depends_on:
      - app

  # ── Frontend ────────────────────────────────────────────────────────────
  # Two services, gated by docker-compose `profiles:`. Exactly ONE runs at a
  # time (whichever profile you pass to `up`). They share the same host port
  # and container name so the rest of the stack (nginx, tunnel) doesn't need
  # to know which mode is active.
  #
  # Switch modes:
  #   make use-dev-env  && docker compose --profile dev  up -d --build
  #   make use-prod-env && docker compose --profile prod up -d --build
  #
  # The `make up` / `make up-prod` targets wrap these.

  frontend-dev:
    image: node:20-alpine
    container_name: epos-frontend
    working_dir: /var/www/frontend
    volumes:
      - ./portal/frontend:/var/www/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_PROXY_TARGET: http://nginx
      NEXT_PUBLIC_API_URL: /api
    # DEV: next dev with HMR. portal/frontend/.env.local must contain
    #   NEXT_PUBLIC_API_URL=/api  +  API_PROXY_TARGET=http://nginx
    command: sh -c "npm install && npm run dev"
    networks:
      - epos-network
    depends_on:
      - nginx
    profiles:
      - dev

  frontend-prod:
    image: node:20-alpine
    container_name: epos-frontend
    working_dir: /var/www/frontend
    volumes:
      - ./portal/frontend:/var/www/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    # PROD: install ALL deps (Tailwind v4 + TS need devDependencies even in
    # prod builds), build the bundle once, serve. NEXT_PUBLIC_* are inlined
    # into the bundle at build time — portal/frontend/.env.local must point
    # at the public backend URL (e.g. https://web-backend.theshin.info/api).
    command: sh -c "npm ci --include=dev && npm run build && npm run start -- -H 0.0.0.0 -p 3000"
    environment:
      NODE_ENV: production
    networks:
      - epos-network
    depends_on:
      - nginx
    profiles:
      - prod

  postgres:
    image: postgres:15-alpine
    container_name: epos-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-epos_portal}
      POSTGRES_USER: ${DB_USERNAME:-epos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-epos_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - epos-network

  redis:
    image: redis:7-alpine
    container_name: epos-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - epos-network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: epos-queue
    user: root
    working_dir: /var/www/portal
    command: php artisan queue:work --queue=default,deployments --tries=3 --timeout=90 --sleep=3
    volumes:
      - ./portal:/var/www/portal
    networks:
      - epos-network
    depends_on:
      - app
      - postgres
      - redis
    restart: unless-stopped
    profiles:
      - worker

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: epos-scheduler
    user: root
    working_dir: /var/www/portal
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./portal:/var/www/portal
    networks:
      - epos-network
    depends_on:
      - app
      - postgres
      - redis
    restart: unless-stopped
    profiles:
      - worker

networks:
  epos-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
